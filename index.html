<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residencial Chang Pro - Sistema Administrativo</title>
    
    <!-- Tailwind CSS para Estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React y Babel para ejecutar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            LayoutDashboard, Users, Home, FileText, Settings, 
            LogOut, Plus, Search, X, ChevronRight,
            Building, UserPlus, FileSignature, Download,
            User, History, Receipt, MessageCircle, TrendingUp, Calendar, Save, Trash2, Wrench
        } = lucideReact;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "", // El entorno proporcionará esto
            authDomain: "",
            projectId: "",
            storageBucket: "",
            messagingSenderId: "",
            appId: ""
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'residencial-chang-v2';

        const INITIAL_SETTINGS = {
            buildingName: 'Edificio Residencial Chang',
            address: 'Jr Dos de mayo 477',
            adminName: 'KARIM LIZET GÓMEZ BARRUETA',
            adminDni: '42890721',
            currency: 'S/',
            logoUrl: 'https://i.imgur.com/6yqwpYs.png', 
            contractTemplate: `CONTRATO DE ARRENDAMIENTO PRIVADO\n\nConste por el presente documento el acuerdo entre LA ADMINISTRACIÓN y EL INQUILINO(A) para el alquiler del Cuarto N° [Número de cuarto], ubicado en el Piso [Piso] del [Edificio].\n\n1. RENTA: El monto mensual acordado es de [Monto], el cual se pagará por adelantado cada mes.\n2. GARANTÍA: El inquilino entrega la suma de [Garantía] en calidad de depósito.\n3. PLAZO: El contrato inicia el [Fecha inicio] y finaliza el [Fecha fin].\n\nAmbas partes firman en señal de conformidad.`
        };

        // --- HOOKS ---
        function useSettings(user) {
            const [settings, setSettings] = useState(INITIAL_SETTINGS);
            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}/config/general`;
                const unsub = db.doc(path).onSnapshot((snap) => {
                    if (snap.exists) setSettings(snap.data());
                    else db.doc(path).set(INITIAL_SETTINGS);
                });
                return () => unsub();
            }, [user]);
            const save = async (val) => { if (user) await db.doc(`artifacts/${appId}/users/${user.uid}/config/general`).set(val); };
            return [settings, save];
        }

        function useCollection(user, colName) {
            const [data, setData] = useState([]);
            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/users/${user.uid}/${colName}`;
                const unsub = db.collection(path).onSnapshot((snap) => {
                    const items = [];
                    snap.forEach(d => items.push({ ...d.data(), id: d.id }));
                    setData(items);
                });
                return () => unsub();
            }, [user, colName]);
            const save = async (item) => {
                const id = item.id || Date.now().toString();
                await db.collection(`artifacts/${appId}/users/${user.uid}/${colName}`).doc(id).set({ ...item, id });
            };
            const remove = async (id) => {
                await db.collection(`artifacts/${appId}/users/${user.uid}/${colName}`).doc(id).delete();
            };
            return [data, save, remove];
        }

        // --- COMPONENTES ---
        function App() {
            const [user, setUser] = useState(null);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsub = auth.onAuthStateChanged((u) => { setUser(u); setIsReady(true); });
                return () => unsub();
            }, []);

            if (!isReady) return (
                <div className="min-h-screen flex items-center justify-center bg-slate-950">
                    <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            if (!isLoggedIn) return <LoginScreen onLogin={() => setIsLoggedIn(true)} />;
            return <MainDashboard user={user} onLogout={() => setIsLoggedIn(false)} />;
        }

        function LoginScreen({ onLogin }) {
            const [pin, setPin] = useState('');
            const [error, setError] = useState('');
            const handleLogin = (e) => {
                e.preventDefault();
                if (pin === 'LEVG2026') onLogin();
                else { setError('PIN incorrecto'); setPin(''); }
            };
            return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center p-6">
                    <div className="bg-white rounded-[3rem] p-12 w-full max-w-md text-center shadow-2xl">
                        <Building className="mx-auto mb-6 text-slate-900" size={48} />
                        <h1 className="text-2xl font-black uppercase tracking-tighter mb-8">Acceso Administrativo</h1>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <input type="password" value={pin} onChange={e => setPin(e.target.value)} className="w-full p-6 bg-slate-100 rounded-3xl text-center text-3xl tracking-[0.5em] outline-none border-4 border-transparent focus:border-indigo-500 transition-all" placeholder="••••" />
                            {error && <p className="text-rose-500 font-bold text-xs uppercase">{error}</p>}
                            <button className="w-full bg-slate-900 text-white py-5 rounded-3xl font-black uppercase tracking-widest hover:bg-black transition-all">Entrar</button>
                        </form>
                    </div>
                </div>
            );
        }

        function MainDashboard({ user, onLogout }) {
            const [view, setView] = useState('dashboard');
            const [settings, saveSettings] = useSettings(user);
            const [tenants, saveTenant, removeTenant] = useCollection(user, 'tenants');
            const [rooms, saveRoom] = useCollection(user, 'rooms');
            const [contracts, saveContract] = useCollection(user, 'contracts');
            const [payments, savePayment] = useCollection(user, 'payments');

            useEffect(() => {
                if (rooms.length === 0) {
                    for(let f=1; f<=5; f++) for(let i=1; i<=10; i++) {
                        const n = `${f}${i.toString().padStart(2,'0')}`;
                        saveRoom({ id: `r${n}`, number: n, floor: f, status: 'available', price: 500, guarantee: 500 });
                    }
                }
            }, [rooms.length]);

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <aside className="w-full md:w-72 bg-slate-950 text-white p-8 flex flex-col shrink-0">
                        <div className="mb-10 flex items-center gap-3">
                            <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center"><Building className="text-slate-900" size={20}/></div>
                            <span className="font-black text-xs uppercase tracking-tighter truncate">{settings.buildingName}</span>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <NavBtn icon={<LayoutDashboard size={18}/>} label="Dashboard" active={view === 'dashboard'} onClick={() => setView('dashboard')} />
                            <NavBtn icon={<Users size={18}/>} label="Inquilinos" active={view === 'tenants'} onClick={() => setView('tenants')} />
                            <NavBtn icon={<Home size={18}/>} label="Cuartos" active={view === 'rooms'} onClick={() => setView('rooms')} />
                            <NavBtn icon={<Settings size={18}/>} label="Ajustes" active={view === 'settings'} onClick={() => setView('settings')} />
                        </nav>
                        <button onClick={onLogout} className="mt-10 flex items-center gap-2 text-slate-500 hover:text-rose-400 font-bold text-[10px] uppercase tracking-widest"><LogOut size={16}/> Salir</button>
                    </aside>
                    <main className="flex-1 bg-[#F8FAFC] p-6 md:p-12 overflow-auto">
                        {view === 'dashboard' && <DashboardView rooms={rooms} tenants={tenants} payments={payments} settings={settings} />}
                        {view === 'tenants' && <TenantsView tenants={tenants} saveTenant={saveTenant} removeTenant={removeTenant} rooms={rooms} contracts={contracts} saveContract={saveContract} saveRoom={saveRoom} payments={payments} savePayment={savePayment} settings={settings} />}
                        {view === 'rooms' && <RoomsView rooms={rooms} saveRoom={saveRoom} tenants={tenants} contracts={contracts} settings={settings} />}
                        {view === 'settings' && <SettingsView settings={settings} saveSettings={saveSettings} />}
                    </main>
                </div>
            );
        }

        function NavBtn({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all ${active ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:bg-white/5 hover:text-white'}`}>
                    {icon} <span className="font-black text-[10px] uppercase tracking-widest">{label}</span>
                </button>
            );
        }

        // --- SUBVISTAS ---
        function DashboardView({ rooms, tenants, payments, settings }) {
            const occupied = rooms.filter(r => r.status === 'occupied').length;
            const available = rooms.filter(r => r.status === 'available').length;
            const totalCash = payments.reduce((acc, p) => acc + (Number(p.amount) || 0), 0);

            return (
                <div className="space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <h1 className="text-4xl font-black text-slate-900 uppercase tracking-tighter italic">Resumen</h1>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Ocupación</p>
                            <p className="text-4xl font-black text-indigo-600">{occupied} / {rooms.length}</p>
                        </div>
                        <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Disponibles</p>
                            <p className="text-4xl font-black text-emerald-600">{available}</p>
                        </div>
                        <div className="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl text-white">
                            <p className="text-[10px] font-black text-indigo-400 uppercase mb-1">Caja Total</p>
                            <p className="text-4xl font-black">{settings.currency}{totalCash.toLocaleString()}</p>
                        </div>
                    </div>
                </div>
            );
        }

        function TenantsView({ tenants, saveTenant, removeTenant, rooms, contracts, saveContract, saveRoom, payments, savePayment, settings }) {
            const [showAdd, setShowAdd] = useState(false);
            const [selected, setSelected] = useState(null);

            const handleNewTenant = async (t, rid, c) => {
                const tid = "T" + Date.now();
                await saveTenant({ ...t, id: tid });
                if (rid) {
                    await saveRoom({ ...rooms.find(r => r.id === rid), status: 'occupied' });
                    await saveContract({ ...c, id: "C" + Date.now(), tenantId: tid, roomId: rid, active: true });
                    await savePayment({ id: "P" + Date.now(), tenantId: tid, amount: c.guarantee, concept: 'Garantía', paymentDate: new Date().toISOString().split('T')[0] });
                }
                setShowAdd(false);
            };

            return (
                <div className="space-y-10">
                    <div className="flex justify-between items-center">
                        <h2 className="text-3xl font-black uppercase tracking-tighter">Inquilinos</h2>
                        <button onClick={() => setShowAdd(true)} className="bg-indigo-600 text-white px-6 py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest flex items-center gap-2 shadow-xl hover:bg-indigo-700 transition-all"><Plus size={16}/> Registrar</button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {tenants.map(t => {
                            const c = contracts.find(x => x.tenantId === t.id && x.active);
                            const r = rooms.find(x => x.id === c?.roomId);
                            return (
                                <div key={t.id} className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm hover:shadow-xl transition-all group">
                                    <div className="flex items-center gap-4 mb-6">
                                        <div className="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center font-black text-indigo-600 text-xl group-hover:bg-indigo-600 group-hover:text-white transition-all">{t.name[0]}</div>
                                        <div>
                                            <h3 className="font-black text-slate-800 uppercase text-md leading-none">{t.name} {t.lastName}</h3>
                                            <p className="text-[9px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Cuarto: {r ? r.number : '?'}</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setSelected({tenant: t, room: r, contract: c})} className="flex-1 bg-slate-900 text-white py-3 rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-black transition-all">Ver Contrato</button>
                                        <button onClick={() => { if(confirm('¿Eliminar?')) removeTenant(t.id); }} className="p-3 bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-all"><Trash2 size={16}/></button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {showAdd && <AddModal onCancel={() => setShowAdd(false)} onSave={handleNewTenant} rooms={rooms} settings={settings} />}
                    {selected && <ContractModal data={selected} settings={settings} onClose={() => setSelected(null)} />}
                </div>
            );
        }

        function AddModal({ onCancel, onSave, rooms, settings }) {
            const [form, setForm] = useState({ name:'', lastName:'', document:'', phone:'', roomId:'' });
            return (
                <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-[3rem] p-10 w-full max-w-lg shadow-2xl">
                        <h3 className="text-2xl font-black uppercase tracking-tighter mb-8 italic">Nueva Admisión</h3>
                        <div className="space-y-4">
                            <input placeholder="NOMBRES" className="w-full p-5 bg-slate-100 rounded-2xl font-bold text-xs outline-none" onChange={e => setForm({...form, name: e.target.value})} />
                            <input placeholder="APELLIDOS" className="w-full p-5 bg-slate-100 rounded-2xl font-bold text-xs outline-none" onChange={e => setForm({...form, lastName: e.target.value})} />
                            <input placeholder="DNI" className="w-full p-5 bg-slate-100 rounded-2xl font-bold text-xs outline-none" onChange={e => setForm({...form, document: e.target.value})} />
                            <input placeholder="CELULAR" className="w-full p-5 bg-slate-100 rounded-2xl font-bold text-xs outline-none" onChange={e => setForm({...form, phone: e.target.value})} />
                            <select className="w-full p-5 bg-indigo-50 rounded-2xl font-black text-xs outline-none border-2 border-indigo-100" onChange={e => setForm({...form, roomId: e.target.value})}>
                                <option value="">SELECCIONAR CUARTO...</option>
                                {rooms.filter(r => r.status === 'available').map(r => <option key={r.id} value={r.id}>C-{r.number} ({settings.currency}{r.price})</option>)}
                            </select>
                        </div>
                        <div className="flex gap-4 mt-8">
                            <button onClick={onCancel} className="flex-1 p-5 text-slate-400 font-black uppercase text-[10px]">Cerrar</button>
                            <button onClick={() => onSave({name: form.name, lastName: form.lastName, document: form.document, phone: form.phone}, form.roomId, {amount: 500, guarantee: 500, startDate: new Date().toISOString().split('T')[0]})} className="flex-1 bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase text-[10px] shadow-lg">Guardar</button>
                        </div>
                    </div>
                </div>
            );
        }

        function RoomsView({ rooms, saveRoom, tenants, contracts, settings }) {
            return (
                <div className="space-y-10">
                    <h2 className="text-3xl font-black uppercase tracking-tighter">Inventario de Cuartos</h2>
                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                        {rooms.sort((a,b)=>a.number.localeCompare(b.number)).map(r => (
                            <div key={r.id} className={`p-6 rounded-[2rem] border-2 transition-all ${r.status === 'occupied' ? 'bg-white border-indigo-100 shadow-sm' : 'bg-emerald-50 border-emerald-100'}`}>
                                <p className="text-[9px] font-black text-slate-400 mb-1">PISO {r.floor}</p>
                                <p className="text-2xl font-black text-slate-900">{r.number}</p>
                                <div className="mt-4 flex gap-1">
                                    <button onClick={() => saveRoom({...r, status: 'available'})} className={`h-1.5 flex-1 rounded-full ${r.status === 'available' ? 'bg-emerald-500' : 'bg-slate-200'}`}></button>
                                    <button onClick={() => saveRoom({...r, status: 'occupied'})} className={`h-1.5 flex-1 rounded-full ${r.status === 'occupied' ? 'bg-indigo-500' : 'bg-slate-200'}`}></button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function SettingsView({ settings, saveSettings }) {
            const [form, setForm] = useState(settings);
            return (
                <div className="space-y-10">
                    <div className="flex justify-between items-center">
                        <h2 className="text-3xl font-black uppercase tracking-tighter">Configuración</h2>
                        <button onClick={() => saveSettings(form)} className="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-black uppercase text-[10px] shadow-xl hover:bg-indigo-700 transition-all flex items-center gap-2"><Save size={16}/> Guardar</button>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                        <div className="bg-white p-10 rounded-[3rem] border border-slate-200 space-y-4">
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Nombre del Edificio</label>
                            <input value={form.buildingName} onChange={e => setForm({...form, buildingName: e.target.value})} className="w-full p-5 bg-slate-100 rounded-2xl font-bold text-xs" />
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Administrador</label>
                            <input value={form.adminName} onChange={e => setForm({...form, adminName: e.target.value})} className="w-full p-5 bg-slate-100 rounded-2xl font-bold text-xs" />
                            <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Logo URL</label>
                            <input value={form.logoUrl} onChange={e => setForm({...form, logoUrl: e.target.value})} className="w-full p-5 bg-slate-100 rounded-2xl font-bold text-xs" />
                        </div>
                        <div className="bg-slate-900 p-10 rounded-[3rem] text-white">
                            <h3 className="font-black text-xs uppercase tracking-widest text-indigo-400 mb-4">Plantilla de Contrato</h3>
                            <textarea value={form.contractTemplate} onChange={e => setForm({...form, contractTemplate: e.target.value})} className="w-full h-80 bg-slate-800 rounded-2xl p-6 font-serif text-sm focus:border-indigo-500 outline-none" />
                        </div>
                    </div>
                </div>
            );
        }

        function ContractModal({ data, settings, onClose }) {
            const { tenant, room, contract } = data;
            return (
                <div className="fixed inset-0 bg-slate-950/95 z-[100] flex items-center justify-center p-4">
                    <div className="bg-white rounded-[3.5rem] w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in duration-300">
                        <div className="p-8 border-b flex justify-between items-center bg-slate-50">
                            <h2 className="font-black uppercase tracking-tighter">Visor de Contrato</h2>
                            <button onClick={onClose} className="p-4 bg-slate-200 rounded-2xl hover:bg-slate-300 transition-all"><X size={20}/></button>
                        </div>
                        <div className="flex-1 overflow-auto bg-slate-200 p-12">
                            <div className="bg-white mx-auto p-16 shadow-2xl min-h-[1100px] w-[210mm] text-justify font-serif" style={{color: '#111'}}>
                                <div className="flex items-center gap-4 border-b-4 border-black pb-6 mb-10">
                                    <img src={settings.logoUrl} className="h-14" />
                                    <h1 className="text-2xl font-black font-sans uppercase">{settings.buildingName}</h1>
                                </div>
                                <div className="whitespace-pre-wrap leading-relaxed">
                                    {settings.contractTemplate
                                        .replace(/\[Admin\]/g, settings.adminName)
                                        .replace(/\[Nombre completo\]/g, `${tenant.name} ${tenant.lastName}`)
                                        .replace(/\[DNI\]/g, tenant.document)
                                        .replace(/\[Número de cuarto\]/g, room?.number || '---')
                                        .replace(/\[Piso\]/g, room?.floor || '---')
                                        .replace(/\[Edificio\]/g, settings.buildingName)
                                        .replace(/\[Monto\]/g, `${settings.currency}${contract?.amount || 0}`)
                                        .replace(/\[Garantía\]/g, `${settings.currency}${contract?.guarantee || 0}`)
                                        .replace(/\[Fecha inicio\]/g, contract?.startDate || '---')}
                                </div>
                                <div className="flex justify-between mt-32 font-sans">
                                    <div className="w-[40%] text-center border-t border-black pt-4 font-bold text-xs">LA ADMINISTRACIÓN</div>
                                    <div className="w-[40%] text-center border-t border-black pt-4 font-bold text-xs">EL INQUILINO(A)</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
